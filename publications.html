<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Publications – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Publications</h1>
  <p>Our research contributions to the field</p>
</div>

<div class="container">
  <section class="section">
    <!-- 연도 필터 -->
    <div class="filter-pills" id="year-filter"></div>
    <!-- 출판 종류(Journals/Conferences) 필터 -->
    <div class="filter-pills" id="type-filter" style="margin-top: 12px; margin-bottom: 24px;"></div>
    
    <div id="pub-list"></div>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<!-- 방대한 논문 데이터(190개)를 담은 별도의 파일을 불러옵니다 -->
<script src="publications_data.js"></script>
<script>
initPage('Publications');

// 연도 필터 배열 생성 (내림차순 정렬)
const years = ['All', ...new Set(publications.map(p => p.year))].map(String);
years.sort((a, b) => a === 'All' ? -1 : b - a);

// 출판 종류 필터 배열 생성
const types = ['All', 'Journals', 'Conferences'];

// 현재 선택된 상태 저장
let activeYear = 'All';
let activeType = 'All';

function render() {
  // 연도 버튼 그리기
  document.getElementById('year-filter').innerHTML = years.map(y =>
    `<button class="filter-pill ${y === activeYear ? 'active' : ''}" onclick="filterYear('${y}')">${y}</button>`
  ).join('');

  // 출판 종류 버튼 그리기
  document.getElementById('type-filter').innerHTML = types.map(t =>
    `<button class="filter-pill ${t === activeType ? 'active' : ''}" onclick="filterType('${t}')">${t}</button>`
  ).join('');

  // 교집합 필터링: 연도와 종류가 모두 일치하는 항목만 추출
  const filtered = publications.filter(p => 
    (activeYear === 'All' || String(p.year) === activeYear) &&
    (activeType === 'All' || p.type === activeType)
  );
  
  // 결과 리스트 렌더링
  document.getElementById('pub-list').innerHTML = filtered.map(p => `
    <div class="pub-entry">
      <div>
        <div class="pub-title">${p.title}</div>
        <div class="pub-authors">${p.authors}</div>
        <div class="pub-links">
          <span class="badge">${p.venue}</span>
          ${p.type === 'Journals' && p.url ? `<a href="${p.url}" target="_blank" style="font-size:12px;font-weight:500;padding:4px 12px;border:1px solid var(--blue);border-radius:4px;color:var(--blue);transition:all 0.2s;text-decoration:none;" onmouseover="this.style.background='var(--blue)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='var(--blue)'">Paper →</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// 클릭 이벤트 함수
function filterYear(y) { activeYear = y; render(); }
function filterType(t) { activeType = t; render(); }

// 초기 렌더링 실행
render();
</script>
</body>
</html>
