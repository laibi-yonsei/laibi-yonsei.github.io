<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>People – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>People</h1>
  <p>Meet our research team</p>
</div>

<div class="container">
  <!-- Faculty -->
  <section class="section">
    <h2 class="section-title">Faculty</h2>
    <div style="display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap;">
      <div class="person-placeholder" style="width: 180px; height: 220px; border-radius: 8px;">Photo</div>
      <div>
        <h3 style="font-size: 24px; color: var(--blue); margin-bottom: 4px;">Prof. Sejung Yang</h3>
        <p style="font-size: 15px; color: var(--gray); margin-bottom: 8px;">Department of Precision Medicine</p>
        <p style="font-size: 14px; color: var(--gray-light); margin-bottom: 12px;">
          <a href="mailto:syang@yonsei.ac.kr">syang@yonsei.ac.kr</a>
        </p>
        <div style="display: flex; gap: 16px;">
          <a href="#" class="badge" style="text-decoration:none;">Google Scholar</a>
          <a href="#" class="badge" style="background: var(--gray); text-decoration:none;">Homepage</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Current Members -->
  <section class="section">
    <h2 class="section-title">Current Members</h2>
    <div class="people-grid" id="members-grid"></div>
  </section>

  <!-- Alumni -->
  <section class="section">
    <h2 class="section-title">Alumni</h2>
    <table class="data-table" id="alumni-table">
      <thead><tr><th>Name</th><th>Degree</th><th>Year</th><th>Current Position</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
initPage('People');

const members = [
  { name: 'Student A', role: 'Ph.D. Student' },
  { name: 'Student B', role: 'Ph.D. Student' },
  { name: 'Student C', role: 'M.S. Student' },
  { name: 'Student D', role: 'M.S. Student' },
  { name: 'Student E', role: 'M.S. Student' },
  { name: 'Student F', role: 'Research Intern' },
];

document.getElementById('members-grid').innerHTML = members.map(m => `
  <div class="person-card">
    <div class="person-placeholder">Photo</div>
    <h4>${m.name}</h4>
    <p>${m.role}</p>
  </div>
`).join('');

const alumni = [
  ['Kim OO', 'M.S.', '2025', 'Samsung SDS'],
  ['Lee OO', 'M.S.', '2024', 'LG AI Research'],
  ['Park OO', 'Ph.D.', '2024', 'Postdoc, KAIST'],
];

document.querySelector('#alumni-table tbody').innerHTML = alumni.map(a =>
  `<tr>${a.map(c => `<td>${c}</td>`).join('')}</tr>`
).join('');
</script>
</body>
</html>
