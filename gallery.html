<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .gallery-item { position: relative; overflow: hidden; border-radius: 6px; }
  .gallery-item .caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: #fff; padding: 24px 12px 10px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
  }
  .gallery-item:hover .caption { opacity: 1; }
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Gallery</h1>
  <p>Lab events and activities</p>
</div>

<div class="container">
  <section class="section">
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
initPage('Gallery');

const photos = [
  'Lab Retreat 2025', 'MICCAI Presentation', 'Group Photo',
  'Workshop', 'Lab Seminar', 'Graduation Ceremony',
  'Conference Trip', 'Team Dinner', 'Poster Session',
];

// Generate placeholder colors for visual variety
const colors = ['#e8ddd3','#d3dde8','#d8e8d3','#e8d3d8','#ddd3e8','#e8e4d3','#d3e8e4','#e0d3e8','#e8d8d3'];

document.getElementById('gallery-grid').innerHTML = photos.map((p, i) => `
  <div class="gallery-item">
    <div style="width:100%;height:200px;background:${colors[i]};display:flex;align-items:center;justify-content:center;color:var(--gray-light);font-size:13px;">
      📷 ${p}
    </div>
    <div class="caption">${p}</div>
  </div>
`).join('');
</script>
</body>
</html>
