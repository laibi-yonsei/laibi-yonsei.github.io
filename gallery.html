<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
<style>
  /* 갤러리 기본 디자인 */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    margin-top: 24px;
  }

  .gallery-item { 
    position: relative; 
    overflow: hidden; 
    border-radius: 10px; 
    background-color: #f8f9fa; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    cursor: pointer; 
    aspect-ratio: 4 / 3;
  }
  
  .gallery-item img {
    width: 100%;
    height: 100%; 
    object-fit: cover; 
    display: block;
    transition: transform 0.4s ease;
  }
  
  .gallery-item:hover img {
    transform: scale(1.08); 
  }

  .gallery-item .caption {
    position: absolute; 
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
    color: #fff; 
    padding: 30px 16px 12px; 
    font-size: 15px; 
    font-weight: 500;
    opacity: 0; 
    transition: opacity 0.3s ease;
    pointer-events: none; 
  }
  
  .gallery-item:hover .caption { 
    opacity: 1; 
  }

  /* 💡 원본 크기를 위해 수정된 팝업(모달) 창 스타일 */
  .modal-overlay {
    display: none; 
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background-color: rgba(0, 0, 0, 0.9); 
    z-index: 9999; 
    
    /* 화면보다 큰 원본 사진을 위해 스크롤 허용 */
    overflow: auto; 
    padding: 50px; 
    box-sizing: border-box;
  }

  /* 💡 원본 크기로 뜨는 사진 영역 */
  .modal-content {
    display: block;
    margin: 0 auto; /* 가운데 정렬 */
    
    /* 기존의 90% 제한을 풀어서 원본 크기 그대로 출력되게 함 */
    max-width: none; 
    max-height: none; 
    
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    animation: zoomIn 0.3s ease; 
  }

  /* 💡 스크롤해도 항상 고정되어 있는 닫기(X) 버튼 */
  .modal-close {
    position: fixed; 
    top: 20px;
    right: 30px;
    color: white;
    font-size: 45px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
    z-index: 10000;
  }

  .modal-close:hover {
    color: #bbb;
  }

  @keyframes zoomIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Gallery</h1>
  <p>Lab events and activities</p>
</div>

<div class="container">
  <section class="section">
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>
</div>

<div id="image-modal" class="modal-overlay" onclick="closeModal()">
  <span class="modal-close" onclick="closeModal()">&times;</span>
  <img id="modal-img" class="modal-content" src="" alt="Full size image" onclick="event.stopPropagation()">
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script src="gallery_data.js"></script>
<script>
initPage('Gallery');

// HTML 화면에 사진들을 그려주는 함수
document.getElementById('gallery-grid').innerHTML = photos.map((p) => `
  <div class="gallery-item" onclick="openModal('${p.image}')">
    <img src="${p.image}" alt="${p.title}" onerror="this.src='assets/placeholder.jpg'">
    <div class="caption">${p.title}</div>
  </div>
`).join('');

// 팝업을 여는 함수
function openModal(imageSrc) {
  const modal = document.getElementById('image-modal');
  const modalImg = document.getElementById('modal-img');
  
  modalImg.src = imageSrc; 
  modal.style.display = 'block'; // flex에서 block으로 변경 (스크롤 문제 해결)
}

// 팝업을 닫는 함수
function closeModal() {
  const modal = document.getElementById('image-modal');
  modal.style.display = 'none'; 
}
</script>
</body>
</html>
