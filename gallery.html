<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
<style>
  /* 갤러리 그리드 디자인 */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    margin-top: 24px;
  }

  .gallery-item { 
    position: relative; 
    overflow: hidden; 
    border-radius: 10px; 
    background-color: #f8f9fa; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    cursor: pointer; 
    aspect-ratio: 4 / 3;
  }
  
  .gallery-item img {
    width: 100%; height: 100%; object-fit: cover; 
    display: block; transition: transform 0.4s ease;
  }
  
  .gallery-item:hover img { transform: scale(1.08); }

  .gallery-item .caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
    color: #fff; padding: 30px 16px 12px; font-size: 15px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s ease; pointer-events: none; 
  }
  
  .gallery-item:hover .caption { opacity: 1; }

  /* 💡 참고 이미지 스타일이 적용된 팝업(모달) 창 */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background-color: rgba(0, 0, 0, 0.95); z-index: 9999; 
    overflow: auto; padding: 60px 20px; box-sizing: border-box;
  }

  .modal-container {
    display: flex; flex-direction: column; align-items: center;
    max-width: fit-content; margin: 0 auto; position: relative;
  }

  .modal-content {
    display: block; border-radius: 4px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    animation: zoomIn 0.3s ease;
    /* 원본 크기 유지를 위해 제한 해제 */
    max-width: none; max-height: none;
  }

  /* 하단 제목 스타일 */
  .modal-caption {
    color: #fff; margin-top: 15px; font-size: 18px; font-weight: 500;
    text-align: center; width: 100%;
  }

  /* 닫기 버튼 */
  .modal-close {
    position: fixed; top: 20px; right: 30px;
    color: #fff; font-size: 40px; cursor: pointer; z-index: 10001;
  }

  /* 💡 좌우 내비게이션 버튼 */
  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.1); color: white;
    border: none; width: 60px; height: 60px; border-radius: 50%;
    font-size: 30px; cursor: pointer; transition: 0.3s;
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.3); }
  .prev-btn { left: 30px; }
  .next-btn { right: 30px; }

  @keyframes zoomIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* 모바일 대응 */
  @media (max-width: 768px) {
    .nav-btn { width: 40px; height: 40px; font-size: 20px; }
    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }
    .modal-content { width: 100%; }
  }
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Gallery</h1>
  <p>Lab events and activities</p>
</div>

<div class="container">
  <section class="section">
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>
</div>

<div id="image-modal" class="modal-overlay" onclick="closeModal()">
  <span class="modal-close" onclick="closeModal()">&times;</span>
  
  <button class="nav-btn prev-btn" onclick="changeImage(-1, event)">&#10094;</button>
  <button class="nav-btn next-btn" onclick="changeImage(1, event)">&#10095;</button>

  <div class="modal-container" onclick="event.stopPropagation()">
    <img id="modal-img" class="modal-content" src="">
    <div id="modal-text" class="modal-caption"></div>
  </div>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script src="gallery_data.js"></script>
<script>
initPage('Gallery');

let currentIndex = 0; // 현재 보고 있는 사진의 번호 저장

// 갤러리 생성
document.getElementById('gallery-grid').innerHTML = photos.map((p, index) => `
  <div class="gallery-item" onclick="openModal(${index})">
    <img src="${p.image}" alt="${p.title}" onerror="this.src='assets/placeholder.jpg'">
    <div class="caption">${p.title}</div>
  </div>
`).join('');

// 팝업 열기
function openModal(index) {
  currentIndex = index;
  updateModal();
  document.getElementById('image-modal').style.display = 'block';
  document.body.style.overflow = 'hidden'; // 팝업 시 본문 스크롤 방지
}

// 이미지 및 텍스트 업데이트
function updateModal() {
  const modalImg = document.getElementById('modal-img');
  const modalText = document.getElementById('modal-text');
  
  modalImg.src = photos[currentIndex].image;
  modalText.innerText = photos[currentIndex].title;
}

// 이미지 변경 (이전/다음)
function changeImage(step, event) {
  if (event) event.stopPropagation(); // 배경 클릭 이벤트 방지
  
  currentIndex += step;
  
  // 마지막 사진에서 다음을 누르면 첫 번째로, 반대의 경우 마지막으로 루프
  if (currentIndex >= photos.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = photos.length - 1;
  
  updateModal();
}

// 팝업 닫기
function closeModal() {
  document.getElementById('image-modal').style.display = 'none';
  document.body.style.overflow = 'auto'; // 스크롤 복구
}

// 키보드 좌우 화살표 및 ESC 키 지원
document.addEventListener('keydown', (e) => {
  if (document.getElementById('image-modal').style.display === 'block') {
    if (e.key === 'ArrowLeft') changeImage(-1);
    if (e.key === 'ArrowRight') changeImage(1);
    if (e.key === 'Escape') closeModal();
  }
});
</script>
</body>
</html>
