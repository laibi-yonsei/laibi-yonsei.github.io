<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
<style>
  /* 💡 보내주신 이미지의 감성을 그대로 담은 목록형 디자인 */
  .gallery-list {
    display: flex;
    flex-direction: column;
  }
  
  .gallery-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    border-bottom: 1px solid #eaeaea;
    gap: 20px;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  
  .gallery-entry:hover {
    background-color: #fafafa;
  }

  .entry-left {
    display: flex;
    align-items: center;
    gap: 24px;
    flex: 1;
  }

  /* 섬네일 이미지 스타일 */
  .entry-thumb {
    width: 120px;
    height: 80px;
    border-radius: 6px;
    object-fit: cover;
    background-color: #f4f4f4;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .entry-info {
    flex: 1;
  }

  .entry-title {
    font-size: 17px;
    font-weight: 600;
    color: #222;
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .entry-desc {
    font-size: 14px;
    color: #888;
  }

  /* 우측 뱃지 영역 (이미지 캡처본 스타일) */
  .entry-meta {
    display: flex;
    gap: 10px;
  }

  .entry-badge {
    background-color: #f1f3f5;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: #333;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge-label {
    color: #999;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
  }

  /* 💡 팝업(모달) 스타일 유지 */
  .modal-overlay {
    display: none;
    position: fixed; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background-color: rgba(0, 0, 0, 0.9);
    z-index: 9999; 
    justify-content: center; align-items: center;
    padding: 20px;
  }

  .modal-content {
    max-width: 95%; max-height: 90vh;
    object-fit: contain;
    animation: zoomIn 0.3s ease;
    border-radius: 4px;
  }

  .modal-close {
    position: absolute; top: 20px; right: 30px;
    color: white; font-size: 40px; cursor: pointer;
  }

  @keyframes zoomIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* 반응형 처리 */
  @media (max-width: 768px) {
    .gallery-entry { flex-direction: column; align-items: flex-start; }
    .entry-meta { margin-top: 10px; width: 100%; justify-content: flex-start; }
    .entry-thumb { width: 100px; height: 65px; }
  }
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Gallery</h1>
  <p>Lab events and activities</p>
</div>

<div class="container">
  <section class="section">
    <div class="gallery-list" id="gallery-list"></div>
  </section>
</div>

<div id="image-modal" class="modal-overlay" onclick="closeModal()">
  <span class="modal-close" onclick="closeModal()">&times;</span>
  <img id="modal-img" class="modal-content" src="">
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script src="gallery_data.js"></script>
<script>
initPage('Gallery');

// 새롭게 바뀐 리스트 스타일로 화면 그리기
document.getElementById('gallery-list').innerHTML = photos.map((p) => {
  // 제목에서 연도(예: 2025)를 추출하거나, 없으면 기본값을 표시합니다.
  const yearMatch = p.title.match(/\d{4}/);
  const year = yearMatch ? yearMatch[0] : 'Event';

  return `
    <div class="gallery-entry" onclick="openModal('${p.image}')">
      <div class="entry-left">
        <img src="${p.image}" class="entry-thumb" onerror="this.src='assets/placeholder.jpg'">
        <div class="entry-info">
          <div class="entry-title">${p.title}</div>
          <div class="entry-desc">Lab Activity & Research Record</div>
        </div>
      </div>
      
      <div class="entry-right">
        <div class="entry-meta">
          <div class="entry-badge">
            <span class="badge-label">DATE</span> ${year}
          </div>
        </div>
      </div>
    </div>
  `;
}).join('');

function openModal(imageSrc) {
  const modal = document.getElementById('image-modal');
  const modalImg = document.getElementById('modal-img');
  modalImg.src = imageSrc;
  modal.style.display = 'flex';
}

function closeModal() {
  document.getElementById('image-modal').style.display = 'none';
}
</script>
</body>
</html>
