<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patents – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Patents</h1>
  <p>Registered and pending patents</p>
</div>

<div class="container">
  <section class="section">
    <h2 class="section-title">International Patents</h2>
    <table class="data-table">
      <thead><tr><th>#</th><th>Title</th><th>Inventors</th><th>Registration No.</th><th>Status</th><th>Year</th></tr></thead>
      <tbody id="intl-body"></tbody>
    </table>
  </section>

  <section class="section">
    <h2 class="section-title">Domestic Patents</h2>
    <table class="data-table">
      <thead><tr><th>#</th><th>Title</th><th>Inventors</th><th>Registration No.</th><th>Status</th><th>Year</th></tr></thead>
      <tbody id="domestic-body"></tbody>
    </table>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
initPage('Patents');

// 번호 체계가 다른 18번 특허는 국제 특허로 분류했습니다.
const intlPatents = [
  { title: '목시플록사신을 이용한 생체조직표면 세포 영상검사장치 및 목시플록사신을 이용한 생체조직표면 세포 영상검사방법', inventors: '김기현, 이중빈, 김성한, 윤창호, 양세정', regNo: '12,320,732', status: 'Grant', year: '2025' }
];

  { title: '주사투과전자현미경 이미지에서의 원자 구조 해석 방법', inventors: '양세정, 고경준, 양동환, 최시영, 한중훈, 이지영, 안홍기', regNo: '102338050', status: 'Grant', year: '2021' },
  { title: '관상동맥 조영 영상을 이용한 심장 협착증 진단 알고리즘', inventors: '양세정, 윤영진, 이지영, 안홍기, 박무열, 이채원', regNo: '102361354', status: 'Grant', year: '2022' },
  { title: '딥러닝을 이용한 흑색종 진단 방법', inventors: '양세정, 정기양, 오병호, 이솔암, 고상백, 유상균, 추유성', regNo: '102297242', status: 'Grant', year: '2021' },
  { title: '피부로부터 상처를 분할하기 위한 영상 처리 방법 및 영상 처리 장치', inventors: '양세정, 이하늘, 이병욱', regNo: '1016618530000', status: 'Grant', year: '2016' },
  { title: '흑색종의 병변 판단 장치 및 방법', inventors: '양세정, 오병호, 이병욱, 정기양, 함성원', regNo: '1016121880000', status: 'Grant', year: '2016' },
  { title: '채도 향상을 위한 영상 처리 장치 및 방법', inventors: '양세정, 이병욱', regNo: '1013593700000', status: 'Grant', year: '2014' },
  { title: 'MRI 용 귀덮개(EAR COVER FOR MRI)', inventors: '양세정, 김동현, 김한성, 김민오, 양승욱, 조웅희', regNo: '1011185470000', status: 'Grant', year: '2012' },

  { title: '워엄 기어형 정량 조절밸브', inventors: '양세정', regNo: '1008643540000', status: 'Grant', year: '2008' },
  { title: '소방용 발광 템퍼 밸브', inventors: '양세정', regNo: '1008350890000', status: 'Grant', year: '2008' },
  { title: '버터 플라이 밸브', inventors: '양세정', regNo: '1007264440000', status: 'Grant', year: '2007' },
  { title: '동파이프용 절연 버터플라이 밸브', inventors: '양세정', regNo: '1006945060000', status: 'Grant', year: '2007' },
  { title: '레버형 정량 조절용 버터플라이 밸브', inventors: '양세정', regNo: '1006636380000', status: 'Grant', year: '2006' },
  { title: '보간 필터를 구비한 CIC 필터 및 그 설계방법', inventors: '장영범, 양세정', regNo: '1006289410000', status: 'Grant', year: '2006' }
];

function renderTable(id, patents) {
  document.getElementById(id).innerHTML = patents.map((p, i) => `
    <tr>
      <td style="color:var(--gray-light);">${i + 1}</td>
      <td><strong>${p.title}</strong></td>
      <td>${p.inventors}</td>
      <td style="font-size:13px;color:var(--gray-light);">${p.regNo}</td>
      <td><span class="badge ${p.status === 'Grant' ? 'badge--green' : 'badge--orange'}">${p.status}</span></td>
      <td>${p.year}</td>
    </tr>
  `).join('');
}

renderTable('intl-body', intlPatents);
renderTable('domestic-body', domesticPatents);
</script>
</body>
</html>
