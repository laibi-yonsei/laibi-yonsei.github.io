<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patents – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Patents</h1>
  <p>Registered and pending patents</p>
</div>

<div class="container">
  <!-- International Patents -->
  <section class="section">
    <h2 class="section-title">International Patents</h2>
    <table class="data-table">
      <thead><tr><th>#</th><th>Title</th><th>Inventors</th><th>Registration No.</th><th>Status</th><th>Year</th></tr></thead>
      <tbody id="intl-body"></tbody>
    </table>
  </section>

  <!-- Domestic Patents -->
  <section class="section">
    <h2 class="section-title">Domestic Patents</h2>
    <table class="data-table">
      <thead><tr><th>#</th><th>Title</th><th>Inventors</th><th>Registration No.</th><th>Status</th><th>Year</th></tr></thead>
      <tbody id="domestic-body"></tbody>
    </table>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
initPage('Patents');

const intlPatents = [
  { title: 'AI-based Medical Image Diagnostic System', inventors: 'S. Yang, A. Kim', regNo: 'US-XXXX-XXXX', status: 'Registered', year: '2025' },
  { title: 'Clinical NLP Pipeline for EHR Data Extraction', inventors: 'S. Yang, B. Lee', regNo: '—', status: 'Pending', year: '2025' },
];

const domesticPatents = [
  { title: '다중 모달 건강 데이터 융합 방법', inventors: '양세정, 박OO', regNo: '10-XXXX-XXXXXXX', status: 'Registered', year: '2024' },
  { title: '자동 병리 보고서 생성 시스템', inventors: '양세정, 최OO', regNo: '—', status: 'Pending', year: '2024' },
  { title: 'AI 기반 의료 영상 진단 보조 시스템', inventors: '양세정, 김OO', regNo: '10-XXXX-XXXXXXX', status: 'Registered', year: '2023' },
];

function renderTable(id, patents) {
  document.getElementById(id).innerHTML = patents.map((p, i) => `
    <tr>
      <td style="color:var(--gray-light);">${i + 1}</td>
      <td><strong>${p.title}</strong></td>
      <td>${p.inventors}</td>
      <td style="font-size:13px;color:var(--gray-light);">${p.regNo}</td>
      <td><span class="badge ${p.status === 'Registered' ? 'badge--green' : 'badge--orange'}">${p.status}</span></td>
      <td>${p.year}</td>
    </tr>
  `).join('');
}

renderTable('intl-body', intlPatents);
renderTable('domestic-body', domesticPatents);
</script>
</body>
</html>
