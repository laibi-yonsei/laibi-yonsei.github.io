<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patents – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .patent-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .patent-entry {
    padding-bottom: 16px;
    border-bottom: 1px solid #f0f0f0;
    transition: transform 0.2s;
  }
  .patent-entry:hover {
    transform: translateX(4px);
  }
  .patent-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .patent-inventors {
    font-size: 15px;
    color: #444;
    margin-bottom: 6px;
  }
  .patent-meta {
    font-size: 13px;
    color: var(--gray-light);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .patent-badge {
    background-color: #f4f6f8;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    color: #555;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Patents</h1>
  <p>Registered and pending patents</p>
</div>

<div class="container">
  <section class="section">
    <h2 class="section-title">International Patents</h2>
    <div class="patent-list" id="intl-list"></div>
  </section>

  <section class="section">
    <h2 class="section-title">Domestic Patents</h2>
    <div class="patent-list" id="domestic-list"></div>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script src="patents.js"></script>
<script>
initPage('Patents');

// 화면에 특허 리스트를 그려주는 함수
function renderPatentList(id, patents) {
  document.getElementById(id).innerHTML = patents.map((p, i) => {
    // 출원번호(appNo)가 데이터에 있을 때만 출력하는 조건부 코드입니다.
    const appNoHtml = p.appNo ? `<span><span class="patent-badge">App No.</span> ${p.appNo}</span>` : '';
    
    return `
      <div class="patent-entry">
        <div class="patent-title">${p.title}</div>
        <div class="patent-inventors">${p.inventors}</div>
        <div class="patent-meta">
          ${appNoHtml}
          <span><span class="patent-badge">Reg No.</span> ${p.regNo}</span>
          <span><span class="patent-badge">Year</span> ${p.year}</span>
        </div>
      </div>
    `;
  }).join('');
}

// 외부 파일(patents.js)에서 불러온 데이터 변수(intlPatents, domesticPatents)를 사용합니다.
renderPatentList('intl-list', intlPatents);
renderPatentList('domestic-list', domesticPatents);
</script>
</body>
</html>
