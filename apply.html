<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apply – LAIBI</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Join Us</h1>
  <p>We are looking for passionate researchers</p>
</div>

<div class="container">
  <!-- Open Positions -->
  <section class="section">
    <h2 class="section-title">Open Positions</h2>
    <div id="positions"></div>
  </section>

  <!-- How to Apply -->
  <section class="section">
    <h2 class="section-title">How to Apply</h2>
    <p style="font-size: 15px; color: var(--gray); line-height: 1.8; max-width: 700px;">
      Please send the following materials to <a href="mailto:syang@yonsei.ac.kr"><strong>syang@yonsei.ac.kr</strong></a>:
    </p>
    <ul style="font-size: 14px; color: var(--gray); line-height: 2.2; padding-left: 20px; margin-top: 12px;">
      <li>CV / Resume</li>
      <li>Transcripts (unofficial is fine)</li>
      <li>Brief statement of research interest (1 page)</li>
      <li>Any relevant publications or portfolio</li>
    </ul>
  </section>

  <!-- FAQ -->
  <section class="section">
    <h2 class="section-title">FAQ</h2>
    <div id="faq-list"></div>
  </section>
</div>

<div id="site-footer"></div>

<script src="components.js"></script>
<script>
initPage('Apply');

const positions = [
  { role: 'Ph.D. Student', desc: 'Research in medical AI and biomedical informatics. Fully funded with tuition and stipend.' },
  { role: 'M.S. Student', desc: 'Thesis-track research in clinical NLP or healthcare data science.' },
  { role: 'Research Intern', desc: 'Undergraduate or visiting students welcome. Minimum 3 months commitment.' },
];

document.getElementById('positions').innerHTML = positions.map(p => `
  <div class="card" style="margin-bottom: 16px; border-radius: 8px;">
    <div class="card-body">
      <h3 style="font-size: 18px; color: var(--blue); margin-bottom: 6px;">${p.role}</h3>
      <p style="font-size: 14px; color: var(--gray);">${p.desc}</p>
    </div>
  </div>
`).join('');

const faqs = [
  { q: 'Do I need prior research experience?', a: 'Prior experience is preferred but not required for M.S. applicants. For Ph.D. applicants, research experience is strongly recommended.' },
  { q: 'Is funding available?', a: 'Yes, all Ph.D. students receive full tuition and stipend support. M.S. funding is available on a case-by-case basis.' },
  { q: 'Can international students apply?', a: 'Yes, we welcome international applicants. Please note that Korean language proficiency is not required.' },
];

document.getElementById('faq-list').innerHTML = faqs.map(f => `
  <div style="margin-bottom: 20px;">
    <h4 style="font-size: 16px; color: #333; margin-bottom: 4px;">Q. ${f.q}</h4>
    <p style="font-size: 14px; color: var(--gray); line-height: 1.7;">A. ${f.a}</p>
  </div>
`).join('');
</script>
</body>
</html>
