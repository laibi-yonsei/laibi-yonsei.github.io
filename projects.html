<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projects – LAIBI</title>
<link rel="stylesheet" href="styles.css" />

<style>
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
}

.project-card {
  background: #fff;
  border: 1px solid #eee;
  border-radius: 9px;
  padding: 24px;
  cursor: pointer;
  transition: box-shadow 0.3s ease, transform 0.2s ease;
}

.project-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  transform: translateY(-2px);
}

.project-card-header {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}

.project-card-icon {
  font-size: 28px;
}

.project-card-title {
  font-size: 17px;
  font-weight: 600;
  color: #333;
}

.project-card-desc {
  font-size: 14px;
  color: var(--gray);
  line-height: 1.6;
}

.project-meta-row {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 13px;
}

.project-meta-label {
  font-weight: 500;
  color: #888;
  min-width: 64px;
}

.status-badge {
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
}

.status-badge.ongoing {
  background: #e3f2fd;
  color: #1976d2;
}

.status-badge.completed {
  background: #f3e5f5;
  color: #7b1fa2;
}

.project-link {
  display: inline-block;
  margin-top: 10px;
  margin-right: 6px;
  font-size: 12px;
  color: #666;
  text-decoration: none;
  padding: 5px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
}

.project-link:hover {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

/* Modal */
.project-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.project-modal-box {
  background: white;
  width: 800px;
  max-width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 40px;
  border-radius: 10px;
  position: relative;
}

.modal-close {
  position: absolute;
  right: 20px;
  top: 10px;
  font-size: 30px;
  cursor: pointer;
}

.modal-section-title {
  border-left: 6px solid #2b6cb0;
  padding-left: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid #ddd;
  margin-top: 30px;
  margin-bottom: 20px;
}

.modal-image {
  width: 100%;
  margin-top: 15px;
  margin-bottom: 30px;
  border-radius: 8px;
}

@media (max-width: 768px) {
  .projects-grid {
    grid-template-columns: 1fr;
  }

  .project-modal-box {
    padding: 28px 20px;
  }
}
</style>
</head>

<body>
<div id="site-nav"></div>

<div class="page-header">
  <h1>Projects</h1>
  <p>Ongoing and completed research projects.</p>
</div>

<div class="container">
  <section class="section">
    <div class="projects-grid" id="projects-grid"></div>
  </section>
</div>

<div id="site-footer"></div>

<div class="project-modal" id="project-modal">
  <div class="project-modal-box">
    <span class="modal-close" onclick="closeProjectModal()">&times;</span>
    <h2 id="modal-title"></h2>
    <hr>
    <div id="modal-content"></div>
  </div>
</div>

<script src="components.js"></script>
<script src="projects_data.js"></script>

<script>
initPage('Projects');

const categoryIcons = {
  'Medical AI': '🏥',
  'Clinical NLP': '📝',
  'Dermatology AI': '🔬',
  'Precision Medicine': '🧬',
  'Healthcare Data Science': '📊',
  'Materials Science AI': '⚛️'
};

function renderProjects() {
  const sortedProjects = [...projects].sort((a, b) => {
    if (a.status === b.status) return 0;
    return a.status === 'ongoing' ? -1 : 1;
  });

  document.getElementById('projects-grid').innerHTML = sortedProjects.map((p, index) => {
    const icon = categoryIcons[p.category] || '📁';

    return `
      <div class="project-card" onclick="openProjectModal(${index})">
        <div class="project-card-header">
          <span class="project-card-icon">${icon}</span>
          <span class="project-card-title">${p.title}</span>
        </div>

        <p class="project-card-desc">${p.desc}</p>

        <div class="project-card-meta">
          <div class="project-meta-row">
            <span class="project-meta-label">Duration</span>
            <span>${p.period}</span>
          </div>

          <div class="project-meta-row">
            <span class="project-meta-label">Funding</span>
            <span>${p.funder}</span>
          </div>

          <div class="project-meta-row">
            <span class="project-meta-label">Status</span>
            <span class="status-badge ${p.status}">
              ${p.status === 'ongoing' ? 'Ongoing' : 'Completed'}
            </span>
          </div>
        </div>

        <div>
          ${p.links.map(link => `
            <a class="project-link" href="${link.url}" target="_blank" onclick="event.stopPropagation()">
              ${link.label}
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function openProjectModal(index) {
  const sortedProjects = [...projects].sort((a, b) => {
    if (a.status === b.status) return 0;
    return a.status === 'ongoing' ? -1 : 1;
  });

  const project = sortedProjects[index];

  document.getElementById('modal-title').innerText = project.title;

  if (!project.modal || project.modal.length === 0) {
    document.getElementById('modal-content').innerHTML = `
      <p style="margin-top:20px;">아직 내용 없음</p>
    `;
  } else {
    document.getElementById('modal-content').innerHTML = project.modal.map(item => `
      <h3 class="modal-section-title">${item.heading}</h3>
      <img src="${item.image}" alt="" class="modal-image">
    `).join('');
  }

  document.getElementById('project-modal').style.display = 'flex';
}

function closeProjectModal() {
  document.getElementById('project-modal').style.display = 'none';
}

document.getElementById('project-modal').addEventListener('click', function(e) {
  if (e.target.id === 'project-modal') {
    closeProjectModal();
  }
});

renderProjects();
</script>
</body>
</html>
